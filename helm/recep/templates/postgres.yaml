---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: recep-{{ .Values.client.name }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.postgres.storageSize }}

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: recep-postgres
  namespace: recep-{{ .Values.client.name }}
spec:
  serviceName: recep-postgres
  replicas: 1
  selector:
    matchLabels:
      app: recep-postgres
  template:
    metadata:
      labels:
        app: recep-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: recep-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: {{ .Values.postgres.db }}
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.user | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: init-sql
          configMap:
            name: recep-init-sql

---
apiVersion: v1
kind: Service
metadata:
  name: recep-postgres
  namespace: recep-{{ .Values.client.name }}
spec:
  selector:
    app: recep-postgres
  ports:
    - port: 5432
