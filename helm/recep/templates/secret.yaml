apiVersion: v1
kind: Secret
metadata:
  name: recep-secrets
  namespace: recep-{{ .Values.client.name }}
type: Opaque
stringData:
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  SARVAM_API_KEY: {{ .Values.secrets.sarvamApiKey | quote }}
  CARTESIA_API_KEY: {{ .Values.secrets.cartesiaApiKey | quote }}
  DEEPGRAM_API_KEY: {{ .Values.secrets.deepgramApiKey | quote }}
  LANGFUSE_PUBLIC_KEY: {{ .Values.secrets.langfusePublicKey | quote }}
  LANGFUSE_SECRET_KEY: {{ .Values.secrets.langfuseSecretKey | quote }}
  LIVEKIT_API_KEY: {{ .Values.secrets.livekitApiKey | quote }}
  LIVEKIT_API_SECRET: {{ .Values.secrets.livekitApiSecret | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
