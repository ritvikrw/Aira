name: SonarQube Analysis

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for better blame/SCM info

      # ── Frontend: install deps + run tests + collect coverage ──
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm run test:coverage -- --watchAll=false --coverageReporters=lcov
        continue-on-error: false

      # ── Backend: install deps + run tests + collect coverage ──
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        working-directory: backend/api
        run: pip install -r requirements.txt pytest pytest-asyncio pytest-cov

      - name: Run backend tests with coverage
        run: |
          python -m pytest tests/test_*.py \
            --cov=backend/api \
            --cov=backend/voice_agent \
            --cov-report=xml:tests/coverage.xml \
            -v
        continue-on-error: false

      # ── SonarQube scan ──
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
