name: Build

on:
  push:
    branches:
      - main
      - master


jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      # ── Frontend: install deps + run tests + collect coverage ──
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm run test:coverage -- --watchAll=false --coverageReporters=lcov
        continue-on-error: true

      # ── Backend: install deps + run tests + collect coverage ──
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: |
          pip install -r backend/api/requirements.txt \
            pytest pytest-asyncio pytest-cov \
            aiosqlite numpy httpx

      - name: Run backend tests with coverage
        run: |
          python -m pytest tests/test_*.py \
            --cov=backend/api \
            --cov=backend/voice_agent \
            --cov-report=xml:tests/coverage.xml \
            -v
        continue-on-error: true

      # ── SonarQube scan ──
      - uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      # If you wish to fail your job when the Quality Gate is red, uncomment the
      # following lines. This would typically be used to fail a deployment.
      # - uses: SonarSource/sonarqube-quality-gate-action@v1
      #   timeout-minutes: 5
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
